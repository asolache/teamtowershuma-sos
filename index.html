<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>TeamTowers SOS V11</title>
    <meta name="description" content="Sistema Operativo de Swarm · Antigravity Kernel V11 · VNA · Slicing Pie">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗼</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/tokens.css?v=11.0.0">
    <link rel="stylesheet" href="/css/base.css?v=11.0.0">

    <script type="module" src="/js/router.js?v=11.0.0" defer></script>
</head>
<body>

    <div id="app"></div>

    <!-- BOOTLOADER -->
    <div id="bootloader" class="kernel-boot">
        <div class="boot-logo">🗼</div>
        <div class="boot-title">SOS <span>V11</span></div>
        <div class="boot-subtitle">ANTIGRAVITY KERNEL · INITIALIZING</div>
        <div class="boot-log">
            <div class="log-line">LOCAL-FIRST ENGINE      <span class="ok">■ OK</span></div>
            <div class="log-line">INDEXEDDB KB LAYER      <span class="ok">■ OK</span></div>
            <div class="log-line">KNOWLEDGE LOADER        <span class="ok">■ OK</span></div>
            <div class="log-line">SLICING PIE LEDGER      <span class="ok">■ OK</span></div>
            <div class="log-line">ANTHROPIC PRIMARY LLM   <span class="sync">◌ SYNCING</span></div>
            <div class="log-line">AGENTIC SWARM           <span class="sync">◌ SYNCING</span></div>
        </div>
        <div class="boot-bar"><div class="boot-bar-fill"></div></div>
    </div>

    <noscript>
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#050507;color:#fff;font-family:monospace;text-align:center;padding:2rem;">
            <div>
                <div style="font-size:3rem;margin-bottom:1rem;">🗼</div>
                <h1>JavaScript requerido</h1>
                <p style="color:#555;">SOS V11 es un Sistema Operativo que corre en el cliente.</p>
            </div>
        </div>
    </noscript>

</body>
</html>
