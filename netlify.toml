[build]
  publish = "."

# Cache para assets estáticos
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# SPAs internas (versiones legacy que siguen en el repo)
[[redirects]]
  from   = "/ia/dev/*"
  to     = "/ia/dev/index.html"
  status = 200

[[redirects]]
  from   = "/v9/*"
  to     = "/v9/index.html"
  status = 200
