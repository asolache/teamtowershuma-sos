[build]
  publish = "."

# Sin cache — assets cambian frecuentemente
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# SPAs internas legacy (siguen en el mismo repo)
[[redirects]]
  from   = "/ia/dev/*"
  to     = "/ia/dev/index.html"
  status = 200

[[redirects]]
  from   = "/v9/*"
  to     = "/v9/index.html"
  status = 200
